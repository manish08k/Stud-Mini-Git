version: "3.9"

services:
  # ── application ──────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: backend/.env
    environment:
      STUD_SERVER_DB_URL: postgresql+psycopg2://stud:stud@db:5432/stud
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      S3_BUCKET: stud-repos
      AWS_ACCESS_KEY_ID: studadmin
      AWS_SECRET_ACCESS_KEY: studpassword
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - repo_data:/data
    restart: unless-stopped

  # ── postgres ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stud
      POSTGRES_PASSWORD: stud
      POSTGRES_DB: stud
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stud"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── zookeeper (Kafka dependency) ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  # ── kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  # ── minio (S3-compatible object storage for local dev) ───────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: studadmin
      MINIO_ROOT_PASSWORD: studpassword
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── minio bucket init ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 studadmin studpassword &&
      mc mb --ignore-existing local/stud-repos &&
      echo 'bucket ready'
      "
    restart: "no"
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  pg_data:
  repo_data:
  minio_data:
