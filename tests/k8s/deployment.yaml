apiVersion: apps/v1
kind: Deployment
metadata:
  name: stud-backend
  namespace: stud
  labels:
    app: stud-backend
    version: "2.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stud-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: stud-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: stud-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # CI replaces :latest with @sha256:<digest> before applying
          image: ghcr.io/YOUR_ORG/stud-backend@sha256:REPLACE_WITH_DIGEST
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: STUD_SERVER_DB_URL
              valueFrom:
                secretKeyRef:
                  name: stud-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stud-secrets
                  key: SECRET_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: stud-secrets
                  key: REDIS_URL
            - name: KAFKA_ENABLED
              value: "true"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: LOG_LEVEL
              value: INFO
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: stud-secrets
                  key: S3_BUCKET
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: stud-secrets
                  key: AWS_REGION
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: repo-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo-data
          persistentVolumeClaim:
            claimName: stud-repo-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stud-backend
  namespace: stud
spec:
  selector:
    app: stud-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stud-backend-hpa
  namespace: stud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stud-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stud-backend-pdb
  namespace: stud
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: stud-backend
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stud-backend-netpol
  namespace: stud
spec:
  podSelector:
    matchLabels:
      app: stud-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: stud-frontend
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    # OTEL collector
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # DNS
    - ports:
        - protocol: UDP
          port: 53
