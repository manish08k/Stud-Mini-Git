apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stud-ingress
  namespace: stud
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.stud.example.com
      secretName: stud-tls
  rules:
    - host: api.stud.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stud-backend
                port:
                  number: 80
